<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>三年级下册语文复习</title>
<style>
:root{--primary:#e67e22;--primary-light:#f39c12;--green:#27ae60;--red:#e74c3c;--blue:#3498db;--bg:#fdf6ec;--card:#fff;--text:#333;--gray:#999;--shadow:0 2px 12px rgba(0,0,0,0.08);--shadow-lg:0 4px 24px rgba(0,0,0,0.12)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"PingFang SC","Microsoft YaHei","Hiragino Sans GB",sans-serif;background:var(--bg);color:var(--text);line-height:1.7;min-height:100vh}
/* Header */
.header{background:linear-gradient(135deg,#2c3e50,#34495e);color:#fff;padding:16px 20px;text-align:center;position:sticky;top:0;z-index:100;box-shadow:0 2px 16px rgba(0,0,0,0.2)}
.header h1{font-size:1.3em;margin-bottom:6px;letter-spacing:1px}
.game-stats{display:flex;justify-content:center;align-items:center;gap:12px;flex-wrap:wrap;font-size:0.82em;margin-top:4px;opacity:0.95}
.game-stat{background:rgba(255,255,255,0.15);padding:3px 10px;border-radius:12px;white-space:nowrap}
.badge-display{display:flex;gap:4px;align-items:center}
.badge-icon{font-size:1em;opacity:0.3;transition:all .3s}
.badge-icon.earned{opacity:1;animation:badgePulse .6s ease}
/* Mode Tabs */
.mode-tabs{display:flex;background:#fff;border-bottom:2px solid #eee;position:sticky;top:52px;z-index:99;overflow-x:auto;-webkit-overflow-scrolling:touch}
.mode-tabs::-webkit-scrollbar{display:none}
.mode-tab{flex-shrink:0;padding:8px 6px;cursor:pointer;font-size:0.72em;text-align:center;border-bottom:3px solid transparent;transition:all .2s;white-space:nowrap;font-weight:500}
.mode-tab:hover{background:#fff5e6}
.mode-tab.active{color:var(--primary);border-bottom-color:var(--primary);font-weight:700;background:#fffbf0}
/* Unit Tabs */
.tabs{display:flex;overflow-x:auto;background:#fff;border-bottom:2px solid #eee;position:sticky;top:102px;z-index:98;-webkit-overflow-scrolling:touch}
.tabs::-webkit-scrollbar{display:none}
.tabs.hidden{display:none}
.tab{flex-shrink:0;padding:10px 16px;cursor:pointer;font-size:0.85em;border-bottom:3px solid transparent;transition:all .2s;white-space:nowrap;position:relative}
.tab:hover{background:#fff5e6}
.tab.active{color:var(--primary);border-bottom-color:var(--primary);font-weight:600}
.tab .progress-dot{position:absolute;top:4px;right:4px;width:6px;height:6px;border-radius:50%;background:var(--green)}
/* Container */
.container{max-width:800px;margin:0 auto;padding:16px}
.unit{display:none}.unit.active{display:block}
.section{background:var(--card);border-radius:12px;padding:20px;margin-bottom:16px;box-shadow:var(--shadow)}
.section h2{color:var(--primary);font-size:1.15em;margin-bottom:12px;padding-bottom:8px;border-bottom:2px dashed #f0e0c0}
.section h3{color:var(--green);font-size:1em;margin:12px 0 8px}
.section h4{color:#555;font-size:0.95em;margin:8px 0 4px}
/* Poem */
.poem{background:#fffbf0;border-left:4px solid var(--primary);padding:12px 16px;margin:8px 0;border-radius:0 8px 8px 0;font-size:0.95em}
.poem .title{font-weight:700;color:var(--primary)}
.poem .author{text-align:right;color:var(--gray);font-size:0.85em}
/* Words */
.word-list{display:flex;flex-wrap:wrap;gap:8px;margin:8px 0}
.word-tag{background:#f0f9ff;border:1px solid #d0e8ff;border-radius:6px;padding:4px 10px;font-size:0.9em}
.word-tag .pinyin{color:var(--blue);font-size:0.8em}
/* Key sentences */
.key-sentence{background:#f8f8f8;padding:10px 14px;border-radius:8px;margin:6px 0;font-size:0.9em;line-height:1.8}
.key-sentence em{color:var(--red);font-style:normal;font-weight:600}
/* Tips */
.tip{background:#fff3cd;border-radius:8px;padding:10px 14px;margin:8px 0;font-size:0.88em;color:#856404}
.tip::before{content:"💡 ";font-size:1.1em}
/* Progress Bar */
.progress-bar{background:#eee;border-radius:10px;height:8px;margin:8px 0;overflow:hidden}
.progress-fill{height:100%;border-radius:10px;background:linear-gradient(90deg,var(--primary),var(--primary-light));transition:width .6s ease}
.progress-text{font-size:0.8em;color:var(--gray);margin-bottom:4px}
/* Quiz */
.quiz-section{background:#f0f7ff;border-radius:12px;padding:20px;margin:16px 0}
.quiz-section h2{color:var(--blue)}
.quiz-q{margin:14px 0;padding:12px;background:#fff;border-radius:8px;border:1px solid #e0e0e0;transition:border-color .3s}
.quiz-q.answered-correct{border-color:var(--green);background:#f0fff4}
.quiz-q.answered-wrong{border-color:var(--red);background:#fff5f5}
.quiz-q .q-title{font-weight:600;margin-bottom:8px}
.quiz-q .q-title .q-num{color:var(--blue);margin-right:6px}
.quiz-options{display:flex;flex-direction:column;gap:6px}
.quiz-opt{padding:8px 12px;border:1px solid #ddd;border-radius:6px;cursor:pointer;transition:all .2s;font-size:0.9em;user-select:none}
.quiz-opt:hover{background:#e8f4fd;border-color:var(--blue)}
.quiz-opt.selected{background:#d4edff;border-color:var(--blue)}
.quiz-opt.correct{background:#d4edda;border-color:var(--green);color:#155724;font-weight:600}
.quiz-opt.wrong{background:#f8d7da;border-color:var(--red);color:#721c24}
.quiz-opt.disabled{pointer-events:none;opacity:0.7}
.quiz-opt.show-correct{background:#d4edda;border-color:var(--green);color:#155724}
/* Fill blank */
.fill-blank{display:inline-block;border-bottom:2px solid var(--primary);min-width:80px;padding:2px 4px;margin:2px 4px}
.fill-input{border:none;border-bottom:2px solid var(--blue);outline:none;width:100px;padding:2px 4px;font-size:0.95em;text-align:center;font-family:inherit;transition:all .3s}
.fill-input.correct{border-color:var(--green);background:#d4edda}
.fill-input.wrong{border-color:var(--red);background:#f8d7da}
/* Feedback */
.feedback{margin-top:8px;padding:8px 12px;border-radius:6px;font-size:0.9em;animation:feedbackIn .3s ease;display:none}
.feedback.show{display:block}
.feedback.correct{background:#d4edda;color:#155724;border:1px solid #c3e6cb}
.feedback.wrong{background:#f8d7da;color:#721c24;border:1px solid #f5c6cb}
/* Buttons */
.btn{display:inline-block;padding:10px 24px;border:none;border-radius:8px;font-size:0.95em;cursor:pointer;transition:all .2s;font-family:inherit;font-weight:500}
.btn-primary{background:var(--primary);color:#fff}.btn-primary:hover{background:#d35400}
.btn-green{background:var(--green);color:#fff}.btn-green:hover{background:#219a52}
.btn-blue{background:var(--blue);color:#fff}.btn-blue:hover{background:#2980b9}
.btn-sm{padding:6px 14px;font-size:0.85em}
.btn-group{display:flex;gap:10px;margin:16px 0;flex-wrap:wrap}
/* Score Box */
.score-box{background:linear-gradient(135deg,var(--green),#2ecc71);color:#fff;border-radius:12px;padding:20px;text-align:center;margin:16px 0;display:none;animation:scoreReveal .5s ease}
.score-box .score-num{font-size:2.5em;font-weight:700}
.score-box .score-text{font-size:0.9em;opacity:0.9;margin-top:4px}
/* Unit title */
.unit-title{font-size:1.3em;color:var(--primary);font-weight:700;margin-bottom:8px;text-align:center}
.unit-subtitle{font-size:0.9em;color:var(--gray);text-align:center;margin-top:-8px;margin-bottom:16px}
/* Flashcard */
.flashcard-scene{perspective:1000px;width:100%;max-width:420px;margin:0 auto}
.flashcard-container{width:100%;height:300px;position:relative;transform-style:preserve-3d;transition:transform .6s cubic-bezier(.4,0,.2,1);cursor:pointer}
.flashcard-container.flipped{transform:rotateY(180deg)}
.flashcard-face{position:absolute;width:100%;height:100%;backface-visibility:hidden;border-radius:16px;padding:24px;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;box-shadow:var(--shadow-lg);overflow:auto}
.flashcard-front{background:linear-gradient(135deg,#fff8f0,#fff);border:2px solid var(--primary)}
.flashcard-back{background:linear-gradient(135deg,#f0fff4,#fff);border:2px solid var(--green);transform:rotateY(180deg)}
.card-type{font-size:0.8em;color:var(--primary);margin-bottom:12px;font-weight:600;background:rgba(230,126,34,0.1);padding:2px 12px;border-radius:10px}
.card-front-content{font-size:1.1em;line-height:1.8;font-weight:500}
.card-front-content .card-char{font-size:2em;font-weight:700;color:var(--primary)}
.card-front-content .card-pinyin{color:var(--blue);font-size:0.9em}
.card-back-content{font-size:0.95em;line-height:1.8;text-align:left;width:100%}
.card-back-content .card-poem{white-space:pre-line;font-size:1em;margin-bottom:8px}
.card-back-content .card-notes{color:#666;font-size:0.85em;border-top:1px dashed #ddd;padding-top:8px;margin-top:8px}
.card-hint{position:absolute;bottom:12px;font-size:0.75em;color:var(--gray)}
.flashcard-nav{display:flex;justify-content:center;align-items:center;gap:16px;margin-top:20px}
.flashcard-counter{font-size:0.9em;color:var(--gray);min-width:60px;text-align:center}
.flashcard-actions{display:flex;gap:10px;margin-top:16px;justify-content:center}
/* Due section */
.due-empty{text-align:center;padding:40px 20px;color:var(--gray)}
.due-empty .due-icon{font-size:3em;margin-bottom:12px}
.due-empty p{font-size:1.1em;margin-top:8px}
/* Badge */
.badge-earned-toast{position:fixed;top:80px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,#f39c12,#e67e22);color:#fff;padding:12px 24px;border-radius:24px;font-size:0.95em;font-weight:600;z-index:200;animation:toastIn .5s ease,toastOut .5s ease 2.5s forwards;box-shadow:var(--shadow-lg);pointer-events:none}
/* Nav btn */
.nav-btn{position:fixed;bottom:20px;right:20px;z-index:100;display:flex;gap:8px}
.nav-btn .btn{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.2em;box-shadow:var(--shadow);padding:0}
/* Animations */
@keyframes feedbackIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
@keyframes scoreReveal{from{opacity:0;transform:scale(0.8)}to{opacity:1;transform:scale(1)}}
@keyframes badgePulse{0%{transform:scale(1)}50%{transform:scale(1.3)}100%{transform:scale(1)}}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(-20px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes toastOut{from{opacity:1}to{opacity:0;pointer-events:none}}
@keyframes cardShine{0%{background-position:200% 0}100%{background-position:-200% 0}}
/* Print */
@media print{.header,.mode-tabs,.tabs,.btn-group,.score-box,.nav-btn,.flashcard-nav,.flashcard-actions{display:none!important}.unit{display:block!important}.section{break-inside:avoid;box-shadow:none;border:1px solid #ddd}}
/* Dictation Mode */
.dictation-card{background:var(--card);border-radius:12px;padding:20px;margin-bottom:14px;box-shadow:var(--shadow);border-left:4px solid var(--blue)}
.dictation-pinyin{font-size:1.8em;color:var(--blue);font-weight:700;margin-bottom:8px;letter-spacing:2px}
.dictation-input{border:2px solid #ddd;border-radius:8px;padding:12px 16px;font-size:1.6em;width:100%;max-width:300px;text-align:center;font-family:"KaiTi","STKaiti","SimSun",serif;transition:all .2s;outline:none}
.dictation-input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(52,152,219,0.15)}
.dictation-input.correct{border-color:var(--green);background:#d4edda}
.dictation-input.wrong{border-color:var(--red);background:#f8d7da}
.dictation-answer{margin-top:10px;font-size:1.1em;color:#666;display:none}
.dictation-answer.show{display:block}
.dictation-answer .correct-text{color:var(--green);font-weight:700;font-size:1.3em}
.dictation-stats{display:flex;gap:12px;margin:12px 0;font-size:0.9em}
.dictation-stats span{padding:4px 12px;border-radius:6px}
.dictation-correct{background:#d4edda;color:#155724}
.dictation-wrong{background:#f8d7da;color:#721c24}
.dictation-progress{margin:12px 0}
@media print{.header,.mode-tabs,.tabs,.btn-group,.score-box,.nav-btn,.flashcard-nav,.flashcard-actions,.dictation-input{display:none!important}.dictation-answer{display:block!important}.unit{display:block!important}.section{break-inside:avoid;box-shadow:none;border:1px solid #ddd}}

/* Game Dictation */
/* Speech Recognition */
.recite-result{background:#f8f9fa;border-radius:12px;padding:16px;margin:12px 0;text-align:center}
.recite-score{font-size:2em;font-weight:700;margin:8px 0}
.recite-score.perfect{color:var(--green)}
.recite-score.good{color:var(--primary)}
.recite-score.bad{color:var(--red)}
.recite-transcript{font-size:1.05em;line-height:1.8;margin:12px 0;text-align:left;background:#fff;padding:12px;border-radius:8px;border:1px solid #eee;min-height:60px;white-space:pre-wrap}
.recite-transcript .correct-char{color:var(--green);font-weight:600}
.recite-transcript .wrong-char{color:var(--red);text-decoration:line-through;font-weight:600}
.recite-transcript .miss-char{color:var(--gray);background:#fff3cd;padding:0 2px;border-radius:2px}
.mic-btn{width:72px;height:72px;border-radius:50%;border:3px solid var(--red);background:#fff;color:var(--red);font-size:1.8em;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;margin:12px auto}
.mic-btn:hover{background:var(--red);color:#fff}
.mic-btn.listening{background:var(--red);color:#fff;animation:pulse 1s infinite}
/* Vocab Dictation */
.vocab-lesson{font-size:1em;font-weight:600;color:var(--primary);margin:12px 0 6px;padding:6px 12px;background:rgba(230,126,34,0.08);border-radius:6px}
.vocab-words{display:flex;flex-wrap:wrap;gap:6px;margin:6px 0 12px}
.vocab-tag{background:#f0f9ff;border:1px solid #d0e8ff;border-radius:6px;padding:4px 10px;font-size:0.9em}
.vocab-game-word{font-size:1.4em;font-weight:700;color:var(--primary);margin:8px 0}
.level-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;max-width:400px;margin:20px auto}
.level-btn{padding:16px;border-radius:12px;border:2px solid #ddd;background:#fff;cursor:pointer;text-align:center;transition:all .2s;position:relative}
.level-btn:hover{transform:translateY(-2px);box-shadow:var(--shadow)}
.level-btn.locked{opacity:0.4;cursor:not-allowed}
.level-btn.locked::after{content:'🔒';position:absolute;top:8px;right:8px;font-size:0.8em}
.level-btn .level-num{font-size:1.5em;font-weight:700;color:var(--primary)}
.level-btn .level-stars{margin-top:4px;font-size:0.9em}
.level-btn.completed{border-color:var(--green);background:#f0fff4}
.hearts{display:flex;justify-content:center;gap:6px;font-size:1.8em;margin:12px 0}
.heart{transition:all .3s}
.heart.lost{opacity:0.2;transform:scale(0.8)}
.game-question{background:var(--card);border-radius:16px;padding:24px;text-align:center;box-shadow:var(--shadow-lg);max-width:400px;margin:0 auto}
.game-pinyin{font-size:2.5em;color:var(--primary);font-weight:700;margin-bottom:16px;letter-spacing:3px}
.game-input{border:3px solid #ddd;border-radius:12px;padding:16px;font-size:2em;width:200px;text-align:center;font-family:'KaiTi','STKaiti',serif;outline:none;transition:all .3s}
.game-input:focus{border-color:var(--primary);box-shadow:0 0 0 4px rgba(230,126,34,0.15)}
.game-input.correct{border-color:var(--green);background:#d4edda;animation:correctBounce .4s ease}
.game-input.wrong{border-color:var(--red);background:#f8d7da;animation:wrongShake .4s ease}
.game-answer{margin-top:12px;font-size:1.1em;color:#666}
.game-answer .correct-text{color:var(--green);font-weight:700;font-size:1.4em}
.result-card{background:var(--card);border-radius:16px;padding:32px;text-align:center;box-shadow:var(--shadow-lg);max-width:400px;margin:20px auto}
.result-stars{font-size:3em;margin:16px 0}
.result-text{font-size:1.2em;color:#555;margin:8px 0}
@keyframes correctBounce{0%{transform:scale(1)}50%{transform:scale(1.1)}100%{transform:scale(1)}}
@keyframes wrongShake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
/* Daily Story */
.story-card{background:var(--card);border-radius:16px;padding:24px;box-shadow:var(--shadow-lg);max-width:600px;margin:0 auto}
.story-title{font-size:1.3em;font-weight:700;color:var(--primary);margin-bottom:12px;text-align:center}
.story-body{font-size:1.05em;line-height:2;margin-bottom:16px;text-indent:2em}
.story-streak{display:flex;align-items:center;justify-content:center;gap:8px;margin:12px 0;font-size:0.9em}
.story-streak .streak-num{font-size:1.5em;font-weight:700;color:var(--primary)}
/* Recitation */
.recite-card{background:var(--card);border-radius:16px;padding:24px;box-shadow:var(--shadow);max-width:500px;margin:0 auto 16px}
.recite-poem{font-size:1.3em;line-height:2.2;text-align:center;margin:16px 0;letter-spacing:1px}
.recite-controls{display:flex;justify-content:center;gap:12px;margin-top:16px}
.play-btn{width:60px;height:60px;border-radius:50%;border:none;font-size:1.5em;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center}
.play-btn:hover{transform:scale(1.1)}
.play-btn.playing{animation:pulse 1s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(230,126,34,0.4)}50%{box-shadow:0 0 0 12px rgba(230,126,34,0)}}
.speed-btn{padding:6px 14px;border:2px solid #ddd;border-radius:20px;background:#fff;cursor:pointer;font-size:0.85em;transition:all .2s}
.speed-btn.active{border-color:var(--primary);background:var(--primary);color:#fff}
/* Mobile */
@media(max-width:600px){.container{padding:10px}.section{padding:14px}.tab{padding:8px 10px;font-size:0.8em}.mode-tab{padding:10px 4px;font-size:0.82em}.header h1{font-size:1.1em}.game-stats{font-size:0.75em;gap:6px}.game-stat{padding:2px 8px}.flashcard-container{height:260px}.flashcard-face{padding:16px}}
/* Tab colors */
.tab[data-unit="1"]{border-bottom-color:#e67e22}.tab[data-unit="2"]{border-bottom-color:#e74c3c}
.tab[data-unit="3"]{border-bottom-color:#3498db}.tab[data-unit="4"]{border-bottom-color:#9b59b6}
.tab[data-unit="5"]{border-bottom-color:#1abc9c}.tab[data-unit="6"]{border-bottom-color:#e91e63}
.tab[data-unit="7"]{border-bottom-color:#ff9800}.tab[data-unit="8"]{border-bottom-color:#607d8b}
</style>
</head>
<body>

<div class="header">
  <h1>📚 三年级下册·语文复习</h1>
  <div class="game-stats" id="gameStats"></div>
</div>

<div class="mode-tabs" id="modeTabs">
  <div class="mode-tab active" data-mode="review" onclick="switchMode('review')">📚复习清单</div>
  <div class="mode-tab" data-mode="recite" onclick="switchMode('recite')">🎤背诵朗读</div>
  <div class="mode-tab" data-mode="quiz" onclick="switchMode('quiz')">📝单元测试</div>
  <div class="mode-tab" data-mode="flashcard" onclick="switchMode('flashcard')">🃏闪卡记忆</div>
  <div class="mode-tab" data-mode="dictation" onclick="switchMode('dictation')">✍️闯关默写</div>
  <div class="mode-tab" data-mode="story" onclick="switchMode('story')">📖每日故事</div>
  <div class="mode-tab" data-mode="review-due" onclick="switchMode('review-due')">📊今日复习</div>
</div>

<div class="tabs" id="unitTabs"></div>

<div class="container" id="app"></div>

<div class="nav-btn">
  <button class="btn btn-primary" onclick="scrollToTop()" title="回到顶部">↑</button>
</div>

<script>
// ==================== DATA ====================
// Textbook vocabulary (课本词语表)
var TEXTBOOK_VOCAB = [
  {lesson:'第2课 燕子', words:['燕子','乌黑','剪刀','活泼','轻风','洒落','赶集','光彩夺目','春光','偶尔','闲散','纤细','电线']},
  {lesson:'第3课 荷花', words:['荷花','公园','清香','赶紧','荷叶','莲蓬','破裂','姿势','画家','本领','了不起','微风','停止']},
  {lesson:'第6课 灰雀', words:['友情','认识','忠诚','驯良','善良','温和','答谢','花言巧语','着急','相信','尘土','凶恶','恶狠狠','猎人','收拾']},

const LS_STATS = 'cn3_stats';

// ==================== LOCALSTORAGE HELPERS ====================
function loadStats() {
  try { return JSON.parse(localStorage.getItem(LS_STATS)) || defaultStats(); }
  catch(e) { return defaultStats(); }
}
function defaultStats() { return {points:0,streak:0,lastStudyDate:'',badges:[]}; }
function saveStats(s) { localStorage.setItem(LS_STATS, JSON.stringify(s)); }

function loadSR() {
  try { return JSON.parse(localStorage.getItem(LS_SR)) || {}; }
  catch(e) { return {}; }
}
function saveSR(sr) { localStorage.setItem(LS_SR, JSON.stringify(sr)); }

function loadProgress() {
  try { return JSON.parse(localStorage.getItem(LS_PROGRESS)) || {}; }
  catch(e) { return {}; }
}
function saveProgress(p) { localStorage.setItem(LS_PROGRESS, JSON.stringify(p)); }

// ==================== GAMIFICATION ====================
function getLevel(points) {
  for (let i = LEVELS.length - 1; i >= 0; i--) {
    if (points >= LEVELS[i].min) return LEVELS[i];
  }
  return LEVELS[0];
}

function updateStreak() {
  const stats = loadStats();
  const today = new Date().toISOString().slice(0,10);
  if (stats.lastStudyDate === today) return;
  const yesterday = new Date(Date.now() - 86400000).toISOString().slice(0,10);
  if (stats.lastStudyDate === yesterday) {
    stats.streak++;
  } else if (stats.lastStudyDate !== today) {
    stats.streak = 1;
  }
  stats.lastStudyDate = today;
  saveStats(stats);
}

function awardPoints(correct) {
  const stats = loadStats();
  if (correct) {
    let pts = 10;
    sessionStreak++;
    if (sessionStreak >= 2) pts += 5;
    stats.points += pts;
  } else {
    sessionStreak = 0;
  }
  saveStats(stats);
  checkBadges();
}

function checkBadges() {
  const stats = loadStats();
  let newBadge = null;
  if (!stats.badges.includes('满分') && quizAnswered) {
    // Check if any quiz in current session got 100%
  }

}

// ==================== SPACED REPETITION ====================
function recordSR(unitNum, type, qIndex, isCorrect) {
  const qId = `u${unitNum}-${type}${qIndex}`;
  const sr = loadSR();
  if (isCorrect) {
    if (sr[qId]) {
      sr[qId].interval = Math.min(sr[qId].interval * 2, 30);
      sr[qId].nextReview = new Date(Date.now() + sr[qId].interval * 86400000).toISOString();
    }
  } else {
    if (!sr[qId]) {
      sr[qId] = {interval:1, nextReview: new Date(Date.now() + 1*86400000).toISOString()};
    } else {
      const idx = SR_INTERVALS.indexOf(sr[qId].interval);
      const nextIdx = idx < 0 ? 0 : Math.min(idx + 1, SR_INTERVALS.length - 1);
      sr[qId].interval = SR_INTERVALS[nextIdx];
      sr[qId].nextReview = new Date(Date.now() + sr[qId].interval * 86400000).toISOString();
    }
  }
  saveSR(sr);
}

function getDueQuestions() {
  const sr = loadSR();
  const now = new Date();
  const due = [];
  for (const [qId, data] of Object.entries(sr)) {
    if (new Date(data.nextReview) <= now) {
      due.push(qId);
    }
  }
  return due;
}

function parseQId(qId) {
  // Format: u{unit}-{type}{index} e.g. u1-c0, u1-f2, u1-r1
  const m = qId.match(/^u(\d+)-([cfr])(\d+)$/);
  if (!m) return null;
  return {unitNum: parseInt(m[1]), type: m[2], idx: parseInt(m[3])};
}

function getDueQuestionData(qId) {
  const parsed = parseQId(qId);
  if (!parsed) return null;
  const unit = UNITS.find(u => u.num === parsed.unitNum);
  if (!unit) return null;
  if (parsed.type === 'c') {
    const q = unit.quiz.choose[parsed.idx];
    if (!q) return null;
    return {qId, unitNum: parsed.unitNum, type:'choose', qData: q, displayType:'选择题'};
  } else if (parsed.type === 'f') {
    const q = unit.quiz.fill[parsed.idx];
    if (!q) return null;
    return {qId, unitNum: parsed.unitNum, type:'fill', qData: q, displayType:'填空题'};
  } else if (parsed.type === 'r') {
    const q = unit.quiz.read?.questions[parsed.idx];
    if (!q) return null;
    return {qId, unitNum: parsed.unitNum, type:'read', qData: q, displayType:'阅读理解'};
  }
  return null;
}

// ==================== PROGRESS ====================
function recordProgress(key) {
  const prog = loadProgress();
  prog[key] = true;
  saveProgress(prog);
}

function getUnitQuizProgress(unitNum) {
  const prog = loadProgress();
  const unit = UNITS.find(u => u.num === unitNum);
  let total = unit.quiz.choose.length + unit.quiz.fill.length;
  if (unit.quiz.read) total += unit.quiz.read.questions.length;
  let done = 0;
  unit.quiz.choose.forEach((q,i) => { if (prog[`q-${unitNum}-c${i}`]) done++; });
  unit.quiz.fill.forEach((q,i) => { if (prog[`q-${unitNum}-f${i}`]) done++; });
  if (unit.quiz.read) unit.quiz.read.questions.forEach((q,i) => { if (prog[`q-${unitNum}-r${i}`]) done++; });
  return {done, total, pct: total > 0 ? Math.round(done/total*100) : 0};
}

function markQuizCorrect(unitNum, type, idx) {
  recordProgress(`q-${unitNum}-${type}${idx}`);
  checkBadges();
}

// ==================== MODE & UNIT SWITCHING ====================
function switchMode(mode) {
  currentMode = mode;
  sessionStreak = 0;
  quizAnswered = {};
  dueQuizState = {};
  document.querySelectorAll('.mode-tab').forEach(t => {
    t.classList.toggle('active', t.dataset.mode === mode);
  });
  const unitTabs = document.getElementById('unitTabs');
  if (mode === 'review-due') {
    unitTabs.classList.add('hidden');
  } else {
    unitTabs.classList.remove('hidden');
  }
  renderContent();
  scrollToTop();
}

function switchUnit(n) {
  currentUnit = n;
  flashcardIndex = 0;
  flashcardFlipped = false;
  quizAnswered = {};
  sessionStreak = 0;
  renderUnitTabs();
  renderContent();
  scrollToTop();
}

// ==================== RENDER FUNCTIONS ====================
function renderUnitTabs() {
  const el = document.getElementById('unitTabs');
  el.innerHTML = UNITS.map(u => {
    const prog = getUnitQuizProgress(u.num);
    const dot = prog.pct > 0 && prog.pct < 100 ? '<span class="progress-dot"></span>' : '';
    return `<div class="tab${u.num===currentUnit?' active':''}" data-unit="${u.num}" onclick="switchUnit(${u.num})">${u.title}${dot}</div>`;
  }).join('');
}

function renderContent() {
  switch(currentMode) {
    case 'review': renderReview(); break;
    case 'quiz': renderQuiz(); break;
    case 'flashcard': renderFlashcard(); break;
    case 'dictation': renderVocabDictation(); break;
    case 'recite': renderRecite(); break;
    case 'story': renderStory(); break;
    case 'review-due': renderReviewDue(); break;
  }
}

  html += `<div class="section" style="padding:14px 20px">
    <div class="progress-text">学习进度 ${prog.pct}%（${prog.done}/${prog.total}题已掌握）</div>
    <div class="progress-bar"><div class="progress-fill" style="width:${prog.pct}%"></div></div>
  </div>`;

  // Review content
  html += `<div class="section"><h2>📋 复习清单</h2>`;

  if (u.review.poems.length > 0) {
    html += `<h3>🖊️ 必背古诗</h3>`;
    u.review.poems.forEach(p => {
      const _s = POEM_STORIES[p.title] || '';
      html += `<div class="poem"><div class="title">《${p.title}》</div><div class="author">${p.author}</div><div style="margin-top:8px;white-space:pre-line">${p.content}</div><div style="margin-top:8px;color:#666;font-size:0.85em">📝 ${p.notes}</div>${_s ? `<div style="margin-top:10px;padding:10px 14px;background:#fff8e1;border-radius:8px;font-size:0.88em;line-height:1.8;border-left:3px solid #f39c12"><b style="color:#e67e22">📖 诗人小故事</b><br>${_s}</div>` : ''}</div>`;
    });
  }

  html += `<h3>✍️ 必会字词</h3><div class="word-list">`;
  u.review.words.forEach(w => {
    html += `<div class="word-tag"><span style="font-size:1.1em;font-weight:600">${w.char}</span> <span class="pinyin">${w.pinyin}</span><br><span style="font-size:0.82em;color:#666">${w.words}</span></div>`;
  });
  html += `</div>`;

  html += `<h3>⭐ 重点句子</h3>`;
  u.review.keySentences.forEach(s => { html += `<div class="key-sentence">${s}</div>`; });

  html += `<h3>📌 复习要点</h3>`;
  u.review.tips.forEach(t => { html += `<div class="tip">${t}</div>`; });

  html += `</div></div>`;
  document.getElementById('app').innerHTML = html;
}

// ---------- QUIZ MODE ----------
function renderQuiz() {
  const u = UNITS.find(x => x.num === currentUnit);
  let html = `<div class="unit active">`;
  html += `<div class="unit-title">${u.title} · 单元测试</div>`;
  html += `<div class="unit-subtitle">${u.subtitle}</div>`;

  html += `<div class="quiz-section"><h2>📝 单元测试</h2>`;

  // Choose
  html += `<h3>一、选择题（每题3分，共${u.quiz.choose.length*3}分）</h3>`;
  u.quiz.choose.forEach((q, i) => {
    html += `<div class="quiz-q" id="qq-c${i}"><div class="q-title"><span class="q-num">${i+1}.</span>${q.q}</div><div class="quiz-options">`;
    q.opts.forEach((opt, j) => {
      html += `<div class="quiz-opt" id="qo-c${i}-${j}" onclick="answerChoose(${currentUnit},${i},${j})">${String.fromCharCode(65+j)}. ${opt}</div>`;
    });
    html += `</div><div class="feedback" id="fb-c${i}"></div></div>`;
  });

  // Fill
  html += `<h3>二、填空题（每空2分，共${u.quiz.fill.reduce((a,f)=>a+f.a.split(',').length,0)*2}分）</h3>`;
  u.quiz.fill.forEach((q, i) => {
    const parts = q.q.split('____');
    let fillHtml = `<div class="quiz-q" id="qq-f${i}"><div class="q-title"><span class="q-num">${i+1}.</span>`;
    parts.forEach((part, pi) => {
      fillHtml += part;
      if (pi < parts.length - 1) {
        fillHtml += `<input class="fill-input" id="fi-${i}-${pi}" placeholder="____" style="width:${Math.max(60,(q.a.split(',')[pi]||'').length*20)}px" onkeydown="if(event.key==='Enter')answerFill(${currentUnit},${i})" onblur="answerFill(${currentUnit},${i})">`;
      }
    });
    fillHtml += `</div><div class="feedback" id="fb-f${i}"></div></div>`;
    html += fillHtml;
  });

  // Reading
  if (u.quiz.read) {
    html += `<h3>三、阅读理解</h3>`;
    html += `<div class="quiz-q" style="background:#fffbf0"><div style="white-space:pre-line;font-size:0.92em;line-height:1.8">${u.quiz.read.passage}</div></div>`;
    u.quiz.read.questions.forEach((q, i) => {
      html += `<div class="quiz-q" id="qq-r${i}"><div class="q-title"><span class="q-num">阅读${i+1}.</span>${q.q}</div><div class="quiz-options">`;
      q.opts.forEach((opt, j) => {
        html += `<div class="quiz-opt" id="qo-r${i}-${j}" onclick="answerRead(${currentUnit},${i},${j})">${String.fromCharCode(65+j)}. ${opt}</div>`;
      });
      html += `</div><div class="feedback" id="fb-r${i}"></div></div>`;
    });
  }
  html += `</div>`;

  html += `<div class="score-box" id="scoreBox"><div class="score-num" id="scoreNum"></div><div class="score-text" id="scoreText"></div></div>`;
  html += `<div class="btn-group">
    <button class="btn btn-primary" onclick="checkAllScore()">📊 查看总分</button>
    <button class="btn btn-green" onclick="resetQuiz()">🔄 重新作答</button>
  </div>`;
  html += `</div>`;
  document.getElementById('app').innerHTML = html;
}

function answerChoose(unitNum, qi, oi) {
  const qId = `q-${unitNum}-c${qi}`;
  if (quizAnswered[qId]) return;
  const u = UNITS.find(x => x.num === unitNum);
  const q = u.quiz.choose[qi];
  const isCorrect = oi === q.ans;
  quizAnswered[qId] = {correct: isCorrect};

  // Highlight
  for (let j = 0; j < q.opts.length; j++) {
    const el = document.getElementById(`qo-c${qi}-${j}`);
    el.classList.add('disabled');
    if (j === q.ans) el.classList.add('show-correct');
    if (j === oi && !isCorrect) el.classList.add('wrong');
  }
  document.getElementById(`qq-c${qi}`).classList.add(isCorrect ? 'answered-correct' : 'answered-wrong');

  // Feedback
  const fb = document.getElementById(`fb-c${qi}`);
  fb.className = `feedback show ${isCorrect ? 'correct' : 'wrong'}`;
  fb.innerHTML = isCorrect ? '✅ 正确！' : `❌ 不对哦！正确答案是：${String.fromCharCode(65+q.ans)}. ${q.opts[q.ans]}`;

  // Points & SR
  awardPoints(isCorrect);
  recordSR(unitNum, 'c', qi, isCorrect);
  if (isCorrect) markQuizCorrect(unitNum, 'c', qi);
  updateStreak();
  renderGameStats();
}

function answerFill(unitNum, fi) {
  const qId = `q-${unitNum}-f${fi}`;
  if (quizAnswered[qId]) return;
  const u = UNITS.find(x => x.num === unitNum);
  const q = u.quiz.fill[fi];
  const answers = q.a.split(',');
  let allCorrect = true;
  let userAnswers = [];
  for (let pi = 0; pi < answers.length; pi++) {
    const input = document.getElementById(`fi-${fi}-${pi}`);
    if (!input) continue;
    const val = input.value.trim();
    userAnswers.push(val);
    if (val === answers[pi]) {
      input.classList.add('correct');
    } else {
      input.classList.add('wrong');
      input.value = val || '___';
      allCorrect = false;
    }
    input.disabled = true;
  }
  // If all inputs are empty, don't mark as answered
  if (userAnswers.every(a => a === '')) return;

  quizAnswered[qId] = {correct: allCorrect};
  document.getElementById(`qq-f${fi}`).classList.add(allCorrect ? 'answered-correct' : 'answered-wrong');

  const fb = document.getElementById(`fb-f${fi}`);
  fb.className = `feedback show ${allCorrect ? 'correct' : 'wrong'}`;
  fb.innerHTML = allCorrect ? '✅ 全部正确！' : `❌ 正确答案：${q.a.replace(/,/g, '、')}`;

  awardPoints(allCorrect);
  recordSR(unitNum, 'f', fi, allCorrect);
  if (allCorrect) markQuizCorrect(unitNum, 'f', fi);
  updateStreak();
  renderGameStats();
}

function answerRead(unitNum, ri, oi) {
  const qId = `q-${unitNum}-r${ri}`;
  if (quizAnswered[qId]) return;
  const u = UNITS.find(x => x.num === unitNum);
  const q = u.quiz.read.questions[ri];
  const isCorrect = oi === q.ans;
  quizAnswered[qId] = {correct: isCorrect};

  for (let j = 0; j < q.opts.length; j++) {
    const el = document.getElementById(`qo-r${ri}-${j}`);
    el.classList.add('disabled');
    if (j === q.ans) el.classList.add('show-correct');
    if (j === oi && !isCorrect) el.classList.add('wrong');
  }
  document.getElementById(`qq-r${ri}`).classList.add(isCorrect ? 'answered-correct' : 'answered-wrong');

  const fb = document.getElementById(`fb-r${ri}`);
  fb.className = `feedback show ${isCorrect ? 'correct' : 'wrong'}`;
  fb.innerHTML = isCorrect ? '✅ 正确！' : `❌ 不对哦！正确答案是：${String.fromCharCode(65+q.ans)}. ${q.opts[q.ans]}`;

  awardPoints(isCorrect);
  recordSR(unitNum, 'r', ri, isCorrect);
  if (isCorrect) markQuizCorrect(unitNum, 'r', ri);
  updateStreak();
  renderGameStats();
}

function checkAllScore() {
  const u = UNITS.find(x => x.num === currentUnit);
  let total = 0, correct = 0;
  u.quiz.choose.forEach((q,i) => { total+=3; const a=quizAnswered[`q-${currentUnit}-c${i}`]; if(a&&a.correct) correct+=3; });
  u.quiz.fill.forEach((q,i) => { total+=2; const a=quizAnswered[`q-${currentUnit}-f${i}`]; if(a&&a.correct) correct+=2; });
  if (u.quiz.read) u.quiz.read.questions.forEach((q,i) => { total+=3; const a=quizAnswered[`q-${currentUnit}-r${i}`]; if(a&&a.correct) correct+=3; });

  const answered = Object.keys(quizAnswered).length;
  if (answered === 0) { alert('请先回答一些题目再查看分数哦！'); return; }

  const pct = Math.round(correct / total * 100);
  const box = document.getElementById('scoreBox');
  document.getElementById('scoreNum').textContent = `${correct}/${total}分`;
  document.getElementById('scoreText').textContent = pct >= 90 ? '🌟 优秀！继续保持！' : pct >= 70 ? '👍 良好！再加把劲！' : pct >= 60 ? '💪 及格了，还需努力！' : '📚 加油！再复习一遍吧！';
  box.style.display = 'block';
  if (pct === 100) markPerfect();
  box.scrollIntoView({behavior:'smooth'});
}

function resetQuiz() {
  sessionStreak = 0;
  quizAnswered = {};
  renderQuiz();
  scrollToTop();
}

// ---------- DICTATION MODE ----------
let dictationState = { index: 0, correct: 0, wrong: 0, answered: {}, items: [] };

function renderDictation() {
  const u = UNITS.find(x => x.num === currentUnit);
  // Build dictation items: each word becomes a dictation question
  dictationState.items = u.review.words.map((w, i) => ({
    id: `d${u.num}-${i}`,
    pinyin: w.pinyin,
    answer: w.char,
    words: w.words,
    hint: w.words.split(' ')[0]  // first word as hint
  }));
  dictationState.index = 0;
  dictationState.correct = 0;
  dictationState.wrong = 0;
  dictationState.answered = {};
  
  let html = `<div class="unit active">`;
  html += `<div class="unit-title">${u.title} · 字词默写</div>`;
  html += `<div class="unit-subtitle">看拼音写汉字，点击输入框后按回车提交</div>`;
  
  // Stats bar
  html += `<div class="dictation-stats" id="dictStats">
    <span class="dictation-correct">✅ 正确: <b id="dictCorrect">0</b></span>
    <span class="dictation-wrong">❌ 错误: <b id="dictWrong">0</b></span>
    <span style="background:#e8f4fd;color:#0c5460">📝 进度: <b id="dictProgress">0</b>/${dictationState.items.length}</span>
  </div>`;
  
  // Dictation cards
  html += `<div id="dictCards">`;
  dictationState.items.forEach((item, i) => {
    const answered = dictationState.answered[item.id];
    const inputClass = answered === true ? 'correct' : answered === false ? 'wrong' : '';
    const showAnswer = answered !== undefined;
    html += `<div class="dictation-card" id="dictCard${i}">
      <div class="dictation-pinyin">${item.pinyin}</div>
      <input class="dictation-input ${inputClass}" id="dictInput${i}" 
        placeholder="请输入汉字" 
        data-answer="${item.answer}" 
        data-idx="${i}"
        ${showAnswer ? 'disabled' : ''}
        onkeydown="if(event.key==='Enter')checkDictation(${i})"
        onblur="checkDictation(${i})">
      <div class="dictation-answer ${showAnswer ? 'show' : ''}" id="dictAns${i}">
        正确答案: <span class="correct-text">${item.answer}</span>
        <span style="color:#999;font-size:0.85em;margin-left:8px">组词: ${item.words}</span>
      </div>
      <div class="dictation-hint">💡 组词提示: ${item.words}</div>
    </div>`;
  });
  html += `</div>`;
  
  // Action buttons
  html += `<div class="btn-group">
    <button class="btn btn-primary" onclick="dictationShowAll()">📖 显示全部答案</button>
    <button class="btn btn-green" onclick="dictationReset()">🔄 重新默写</button>
    <button class="btn btn-blue" onclick="window.print()">🖨️ 打印默写纸</button>
  </div>`;
  
  html += `</div>`;
  document.getElementById('app').innerHTML = html;
}

function checkDictation(idx) {
  const input = document.getElementById(`dictInput${idx}`);
  const item = dictationState.items[idx];
  if (!input || dictationState.answered[item.id] !== undefined) return;
  
  const val = input.value.trim();
  if (!val) return;
  
  const isCorrect = val === item.answer;
  dictationState.answered[item.id] = isCorrect;
  
  if (isCorrect) {
    dictationState.correct++;
    input.classList.add('correct');
    recordAnswer(item.id, true);
  } else {
    dictationState.wrong++;
    input.classList.add('wrong');
    input.value = val + ' → ' + item.answer;
    recordAnswer(item.id, false);
  }
  input.disabled = true;
  document.getElementById(`dictAns${idx}`).classList.add('show');
  
  // Update stats
  document.getElementById('dictCorrect').textContent = dictationState.correct;
  document.getElementById('dictWrong').textContent = dictationState.wrong;
  document.getElementById('dictProgress').textContent = dictationState.correct + dictationState.wrong;
  
  // Update game points
  if (isCorrect) {
    addPoints(10);
    sessionStreak++;
    if (sessionStreak > 1) addPoints(5);
  } else {
    sessionStreak = 0;
  }
  updateGameStats();
}

function dictationShowAll() {
  dictationState.items.forEach((item, i) => {
    const input = document.getElementById(`dictInput${i}`);
    if (dictationState.answered[item.id] === undefined) {
      dictationState.answered[item.id] = false;
      dictationState.wrong++;
      input.classList.add('wrong');
      input.value = '→ ' + item.answer;
      input.disabled = true;
      document.getElementById(`dictAns${i}`).classList.add('show');
      recordAnswer(item.id, false);
    }
  });
  document.getElementById('dictCorrect').textContent = dictationState.correct;
  document.getElementById('dictWrong').textContent = dictationState.wrong;
  document.getElementById('dictProgress').textContent = dictationState.correct + dictationState.wrong;
}

function dictationReset() {
  dictationState.answered = {};
  dictationState.correct = 0;
  dictationState.wrong = 0;
  renderDictation();
}

// ---------- FLASHCARD MODE ----------
function generateFlashcards(unitNum) {
  const u = UNITS.find(x => x.num === unitNum);
  const cards = [];

  u.review.poems.forEach((p, i) => {
    cards.push({
      type: 'poem', typeLabel: '🖊️ 诗句',
      front: `<div style="font-size:1.3em;font-weight:700;color:var(--primary)">《${p.title}》</div><div style="color:var(--gray);margin-top:8px">${p.author}</div>`,
      back: `<div class="card-poem">${p.content}</div><div class="card-notes">📝 ${p.notes}</div>${POEM_STORIES[p.title] ? `<div style="margin-top:8px;padding:8px 12px;background:#fff8e1;border-radius:6px;font-size:0.82em;line-height:1.7;border-left:3px solid #f39c12"><b style="color:#e67e22">📖 小故事</b> ${POEM_STORIES[p.title].substring(0,80)}…</div>` : ''}`,
      id: `poem-${unitNum}-${i}`
    });
  });

  const wpc = 5;
  for (let i = 0; i < u.review.words.length; i += wpc) {
    const group = u.review.words.slice(i, i + wpc);
    cards.push({
      type: 'words', typeLabel: '✍️ 字词',
      front: group.map(w => `<div><span style="font-size:1.4em;font-weight:700;color:var(--primary)">${w.char}</span> <span style="color:var(--blue)">${w.pinyin}</span></div>`).join(''),
      back: group.map(w => `<div style="margin:4px 0"><strong>${w.char}</strong>: ${w.words}</div>`).join(''),
      id: `words-${unitNum}-${i}`
    });
  }

  u.review.keySentences.forEach((s, i) => {
    const partial = s.replace(/<em>([^<]+)<\/em>/g, '____');
    cards.push({
      type: 'sentence', typeLabel: '⭐ 重点句',
      front: `<div style="line-height:1.8;font-size:0.95em">${partial}</div>`,
      back: `<div style="line-height:1.8;font-size:0.95em">${s}</div>`,
      id: `sentence-${unitNum}-${i}`
    });
  });

  return cards;
}

function renderFlashcard() {
  const cards = generateFlashcards(currentUnit);
  if (cards.length === 0) {
    document.getElementById('app').innerHTML = `<div class="unit active"><div class="section"><div class="due-empty"><div class="due-icon">📭</div><p>本单元暂无闪卡内容</p></div></div></div>`;
    return;
  }
  if (flashcardIndex >= cards.length) flashcardIndex = 0;
  const card = cards[flashcardIndex];
  flashcardFlipped = false;

  let html = `<div class="unit active">`;
  html += `<div class="unit-title">${currentUnit} · 闪卡记忆</div>`;

  html += `<div class="flashcard-scene" onclick="flipCard()">
    <div class="flashcard-container" id="flashcard3d">
      <div class="flashcard-face flashcard-front">
        <div class="card-type">${card.typeLabel}</div>
        <div class="card-front-content">${card.front}</div>
        <div class="card-hint">👆 点击翻转</div>
      </div>
      <div class="flashcard-face flashcard-back">
        <div class="card-type" style="color:var(--green)">📝 答案</div>
        <div class="card-back-content">${card.back}</div>
      </div>
    </div>
  </div>`;

  html += `<div class="flashcard-nav">
    <button class="btn btn-sm btn-primary" onclick="prevCard()" ${flashcardIndex===0?'disabled':''}>◀ 上一张</button>
    <span class="flashcard-counter">${flashcardIndex+1} / ${cards.length}</span>
    <button class="btn btn-sm btn-primary" onclick="nextCard()" ${flashcardIndex>=cards.length-1?'disabled':''}>下一张 ▶</button>
  </div>`;

  html += `<div class="flashcard-actions">
    <button class="btn btn-sm btn-green" onclick="markCardLearned()">✅ 已掌握</button>
  </div>`;

  html += `</div>`;
  document.getElementById('app').innerHTML = html;
}

function flipCard() {
  flashcardFlipped = !flashcardFlipped;
  const el = document.getElementById('flashcard3d');
  if (el) el.classList.toggle('flipped', flashcardFlipped);
}

function nextCard() {
  const cards = generateFlashcards(currentUnit);
  if (flashcardIndex < cards.length - 1) {
    flashcardIndex++;
    flashcardFlipped = false;
    renderFlashcard();
  }
}

function prevCard() {
  if (flashcardIndex > 0) {
    flashcardIndex--;
    flashcardFlipped = false;
    renderFlashcard();
  }
}

function markCardLearned() {
  const cards = generateFlashcards(currentUnit);
  const card = cards[flashcardIndex];
  if (card && card.type === 'poem') {
    const m = card.id.match(/poem-(\d+)-(\d+)/);
    if (m) {
      recordProgress(`poem-${m[1]}-${m[2]}`);
      showToast('📖 古诗已标记掌握');
    }
  } else {
    showToast('✅ 已标记');
  }
  updateStreak();
  renderGameStats();
}

// ---------- REVIEW-DUE MODE ----------
function renderReviewDue() {
  const dueIds = getDueQuestions();
  if (dueIds.length === 0) {
    document.getElementById('app').innerHTML = `<div class="section"><div class="due-empty"><div class="due-icon">🎉</div><p>今天没有需要复习的内容！</p><p style="font-size:0.85em;color:var(--gray);margin-top:4px">继续保持，明天再来检查吧！</p></div></div>`;
    return;
  }

  // Group by unit
  const grouped = {};
  dueIds.forEach(id => {
    const parsed = parseQId(id);
    if (!parsed) return;
    if (!grouped[parsed.unitNum]) grouped[parsed.unitNum] = [];
    grouped[parsed.unitNum].push(id);
  });

  let html = `<div class="section"><h2>📊 今日复习</h2>`;
  html += `<p style="color:var(--gray);margin-bottom:16px">共 <strong>${dueIds.length}</strong> 个问题需要复习</p>`;

  for (const [unitNum, ids] of Object.entries(grouped).sort((a,b) => a[0]-b[0])) {
    const unit = UNITS.find(u => u.num === parseInt(unitNum));
    html += `<h3 style="margin-top:20px">${unit.title}（${ids.length}题）</h3>`;

    ids.forEach(qId => {
      const data = getDueQuestionData(qId);
      if (!data) return;
      const safeId = qId.replace(/[^a-zA-Z0-9-]/g, '_');

      if (data.type === 'choose') {
        html += `<div class="quiz-q" id="dq-${safeId}"><div class="q-title"><span class="q-num">${data.displayType}</span>${data.qData.q}</div><div class="quiz-options">`;
        data.qData.opts.forEach((opt, j) => {
          html += `<div class="quiz-opt" id="do-${safeId}-${j}" onclick="answerDueChoose('${safeId}',${data.unitNum},'c',${data.qData.ans},${j})">${String.fromCharCode(65+j)}. ${opt}</div>`;
        });
        html += `</div><div class="feedback" id="dfb-${safeId}"></div></div>`;
      } else if (data.type === 'fill') {
        const parts = data.qData.q.split('____');
        let fhtml = `<div class="quiz-q" id="dq-${safeId}"><div class="q-title"><span class="q-num">${data.displayType}</span>`;
        parts.forEach((part, pi) => {
          fhtml += part;
          if (pi < parts.length - 1) {
            fhtml += `<input class="fill-input" id="dfi-${safeId}-${pi}" placeholder="____" style="width:${Math.max(60,(data.qData.a.split(',')[pi]||'').length*20)}px" onkeydown="if(event.key==='Enter')answerDueFill('${safeId}',${data.unitNum},'f')">`;
          }
        });
        fhtml += `</div><div class="feedback" id="dfb-${safeId}"></div></div>`;
        html += fhtml;
      } else if (data.type === 'read') {
        html += `<div class="quiz-q" id="dq-${safeId}"><div class="q-title"><span class="q-num">${data.displayType}</span>${data.qData.q}</div><div class="quiz-options">`;
        data.qData.opts.forEach((opt, j) => {
          html += `<div class="quiz-opt" id="do-${safeId}-${j}" onclick="answerDueChoose('${safeId}',${data.unitNum},'r',${data.qData.ans},${j})">${String.fromCharCode(65+j)}. ${opt}</div>`;
        });
        html += `</div><div class="feedback" id="dfb-${safeId}"></div></div>`;
      }
    });
  }

  html += `</div>`;
  document.getElementById('app').innerHTML = html;
}

function answerDueChoose(safeId, unitNum, type, ansIdx, chosenIdx) {
  if (dueQuizState[safeId]) return;
  const isCorrect = chosenIdx === ansIdx;
  dueQuizState[safeId] = true;

  // Find all options by prefix match
  const prefix = `do-${safeId}-`;
  for (let j = 0; j < 10; j++) {
    const el = document.getElementById(prefix + j);
    if (!el) break;
    el.classList.add('disabled');
    if (j === ansIdx) el.classList.add('show-correct');
    if (j === chosenIdx && !isCorrect) el.classList.add('wrong');
  }
  document.getElementById(`dq-${safeId}`).classList.add(isCorrect ? 'answered-correct' : 'answered-wrong');

  const fb = document.getElementById(`dfb-${safeId}`);
  const qData = getDueQuestionData(safeId.replace(/_/g, '-'));
  fb.className = `feedback show ${isCorrect ? 'correct' : 'wrong'}`;
  fb.innerHTML = isCorrect ? '✅ 正确！' : `❌ 正确答案是：${String.fromCharCode(65+ansIdx)}`;

  awardPoints(isCorrect);
  // Parse original qId to record SR
  const origId = safeId.replace(/_/g, '-');
  const parsed = parseQId(origId);
  if (parsed) {
    recordSR(parsed.unitNum, parsed.type, parsed.idx, isCorrect);
    if (isCorrect) markQuizCorrect(parsed.unitNum, parsed.type, parsed.idx);
  }
  updateStreak();
  renderGameStats();
}

function answerDueFill(safeId, unitNum, type) {
  if (dueQuizState[safeId]) return;
  const origId = safeId.replace(/_/g, '-');
  const parsed = parseQId(origId);
  if (!parsed) return;
  const unit = UNITS.find(u => u.num === parsed.unitNum);
  if (!unit) return;
  const q = unit.quiz.fill[parsed.idx];
  if (!q) return;
  const answers = q.a.split(',');
  let allCorrect = true;
  let hasInput = false;
  for (let pi = 0; pi < answers.length; pi++) {
    const input = document.getElementById(`dfi-${safeId}-${pi}`);
    if (!input) continue;
    const val = input.value.trim();
    if (val) hasInput = true;
    if (val === answers[pi]) {
      input.classList.add('correct');
    } else {
      input.classList.add('wrong');
      allCorrect = false;
    }
    input.disabled = true;
  }
  if (!hasInput) return;
  dueQuizState[safeId] = true;

  document.getElementById(`dq-${safeId}`).classList.add(allCorrect ? 'answered-correct' : 'answered-wrong');
  const fb = document.getElementById(`dfb-${safeId}`);
  fb.className = `feedback show ${allCorrect ? 'correct' : 'wrong'}`;
  fb.innerHTML = allCorrect ? '✅ 全部正确！' : `❌ 正确答案：${q.a.replace(/,/g, '、')}`;

  awardPoints(allCorrect);
  recordSR(parsed.unitNum, parsed.type, parsed.idx, allCorrect);
  if (allCorrect) markQuizCorrect(parsed.unitNum, parsed.type, parsed.idx);
  updateStreak();
  renderGameStats();
}

function speakPoem(title, rate) {
  stopSpeak();
  if (!window.speechSynthesis) { alert('您的浏览器不支持朗读功能'); return; }
  var unit = UNITS.find(function(x) { return x.num === currentUnit; });
  var poem = unit.review.poems.find(function(p) { return p.title === title; });
  if (!poem) return;
  var text = poem.title + '。' + poem.author + '。' + poem.content.replace(/\n/g, '。');
  doSpeak(text, rate || 0.8);
}

function doSpeak(text, rate) {
  speechSynthesis.cancel();
  // Debug: show voice info
  var voices = speechSynthesis.getVoices();
  var zhVoices = voices.filter(function(v){return v.lang.indexOf('zh')>=0;});
  console.log('Total voices:', voices.length, 'Chinese:', zhVoices.length);
  zhVoices.forEach(function(v){console.log('  -', v.name, v.lang, v.default);});
  var debugDiv = document.getElementById('speechDebug');
  if (debugDiv) {
    debugDiv.style.display = 'block';
    debugDiv.innerHTML = '语音包: ' + voices.length + '个 (中文' + zhVoices.length + '个)<br>' +
      zhVoices.map(function(v){return v.name + ' (' + v.lang + ')';}).join('<br>') +
      '<br>播放状态: 准备中...';
  }
  var utter = new SpeechSynthesisUtterance(text);
  utter.lang = 'zh-CN';
  utter.rate = rate;
  utter.pitch = 1.1;
  var zhVoice = zhVoices.length > 0 ? zhVoices[0] : null;
  if (zhVoice) utter.voice = zhVoice;
  utter.onerror = function(e) {
    console.log('Speech err:', e.error);
    if (debugDiv) debugDiv.innerHTML += '<br>错误: ' + e.error;
  };
  utter.onend = function() {
    console.log('Speech done');
    if (debugDiv) debugDiv.innerHTML += '<br>状态: 播放完毕';
  };
  utter.onstart = function() {
    if (debugDiv) debugDiv.innerHTML += '<br>状态: 正在播放!';
  };
  // Chrome needs resume + user gesture
  speechSynthesis.speak(utter);
  speechSynthesis.pause();
  speechSynthesis.resume();
  if (debugDiv) debugDiv.innerHTML += '<br>状态: 已调用speak()';
  // Retry if not speaking after 200ms (voice loading delay)
  setTimeout(function() {
    var speaking = speechSynthesis.speaking;
    if (debugDiv) debugDiv.innerHTML += '<br>200ms检查: speaking=' + speaking;
    if (speaking) return;
    console.log('Retrying speech, voices:', speechSynthesis.getVoices().length);
    speechSynthesis.speak(utter);
    speechSynthesis.resume();
    if (debugDiv) debugDiv.innerHTML += '<br>状态: 第1次重试';
  }, 200);
  setTimeout(function() {
    var speaking = speechSynthesis.speaking;
    if (debugDiv) debugDiv.innerHTML += '<br>500ms检查: speaking=' + speaking;
    if (speaking) return;
    // Final retry with new utterance
    var u2 = new SpeechSynthesisUtterance(text);
    u2.lang = 'zh-CN'; u2.rate = rate; u2.pitch = 1.1;
    var v2 = speechSynthesis.getVoices().filter(function(v){return v.lang.indexOf('zh')>=0;})[0];
    if (v2) u2.voice = v2;
    speechSynthesis.speak(u2);
    speechSynthesis.resume();
    if (debugDiv) debugDiv.innerHTML += '<br>状态: 第2次重试(新对象)';
  }, 500);
}
function stopSpeak() { speechSynthesis.cancel(); }

function checkStoryAnswer(el, chosen, correct) {
  var opts = el.parentElement.querySelectorAll('.quiz-opt');
  if (el.classList.contains('correct') || el.classList.contains('wrong')) return;
  opts.forEach(function(o, i) {
    o.style.pointerEvents = 'none';
    if (i === correct) o.classList.add('correct');
    if (i === chosen && i !== correct) o.classList.add('wrong');
  });
  var fb = document.getElementById('storyFeedback');
  if (chosen === correct) {
    fb.style.display = 'block';
    fb.style.background = '#d4edda';
    fb.style.color = '#155724';

var reciteRecognition = null;

function startReciteListen(poemTitle) {
  var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) {
    var ua = navigator.userAgent;
    var msg = '您的浏览器不支持语音背诵功能。\n\n推荐使用以下浏览器：\n';
    if (ua.includes('MicroMessenger')) msg += '\u2022 微信内无法使用，请点右上角\u2026选\u201c在浏览器中打开\u201d';
    else if (ua.includes('QQBrowser')) msg += '\u2022 QQ浏览器\u2014\u2014点击地址栏\u2192切换\u201c极速模式\u201d';
    else if (ua.includes('UCBrowser')) msg += '\u2022 UC浏览器\u2014\u2014切换到\u201c极速模式\u201d';
    else if (ua.includes('BaiduBoxApp')) msg += '\u2022 百度APP内无法使用，请在手机自带浏览器中打开';
    else if (ua.includes('HuaweiBrowser')) msg += '\u2022 华为浏览器\u2014\u2014没问题，试试刷新页面';
    else if (ua.includes('XiaoMi')) msg += '\u2022 小米浏览器\u2014\u2014请更新到最新版本';
    else msg += '\u2022 QQ浏览器/UC浏览器（切换极速模式）\n\u2022 手机自带浏览器\n\u2022 Chrome浏览器';
    msg += '\n\n提示：大部分国产浏览器都支持，切换到\u201c极速模式\u201d即可。';
    alert(msg);
    return;
  }
  var u = UNITS.find(function(x){return x.num===currentUnit;});
  var poem = u.review.poems.find(function(p){return p.title===poemTitle;});
  if (!poem) return;
  var target = poem.content.replace(/\n/g,'').replace(/[，。！？、；：""''《》（）\s]/g,'');
  var resultDiv = document.getElementById('reciteResult_'+poemTitle);
  var micBtn = document.getElementById('micBtn_'+poemTitle);
  if (resultDiv) resultDiv.innerHTML = '<div style="color:var(--red);font-size:1.1em">正在听您背诵...</div>';
  if (micBtn) micBtn.classList.add('listening');
  if (reciteRecognition) { try{reciteRecognition.stop();}catch(e){} }
  reciteRecognition = new SR();
  reciteRecognition.lang = 'zh-CN';
  reciteRecognition.continuous = true;
  reciteRecognition.interimResults = true;
  var finalT = '';
  reciteRecognition.onresult = function(ev) {
    var interim = '';
    for (var i=ev.resultIndex;i<ev.results.length;i++) {
      if (ev.results[i].isFinal) finalT += ev.results[i][0].transcript;
      else interim += ev.results[i][0].transcript;
    }
    if (resultDiv) resultDiv.innerHTML = '<div style="color:var(--gray)">'+(finalT+interim)+'</div>';
  };
  reciteRecognition.onend = function() {
    if (micBtn) micBtn.classList.remove('listening');
    if (finalT) gradeRecite(finalT, poemTitle);
  };
  reciteRecognition.onerror = function(e) {
    if (micBtn) micBtn.classList.remove('listening');
    if (resultDiv) resultDiv.innerHTML = '<div style="color:var(--gray)">'+(e.error==='no-speech'?'没有听到声音，再试一次？':'识别出错：'+e.error)+'</div>';
  };
  reciteRecognition.start();
  setTimeout(function(){try{reciteRecognition.stop();}catch(e){}},30000);
}

function gradeRecite(spoken, poemTitle) {
  var u = UNITS.find(function(x){return x.num===currentUnit;});
  var poem = u.review.poems.find(function(p){return p.title===poemTitle;});
  if (!poem) return;
  var target = poem.content.replace(/\n/g,'').replace(/[，。！？、；：""''《》（）\s,.!?;:'"()]/g,'');
  var spokenClean = spoken.replace(/[，。！？、；：""''《》（）\s,.!?;:'"()\u3000]/g,'');
  var m=target.length, n=spokenClean.length;
  var dp=[];for(var i=0;i<=m;i++){dp[i]=[];for(var j=0;j<=n;j++){if(i===0||j===0)dp[i][j]=0;else if(target[i-1]===spokenClean[j-1])dp[i][j]=dp[i-1][j-1]+1;else dp[i][j]=Math.max(dp[i-1][j],dp[i][j-1]);}}
  var match=dp[m][n], acc=Math.round(match/m*100);
  var i2=m,j2=n,tC=[],sC=[];
  while(i2>0&&j2>0){if(target[i2-1]===spokenClean[j2-1]){tC.unshift({ch:target[i2-1],t:'c'});sC.unshift({ch:spokenClean[j2-1],t:'c'});i2--;j2--;}else if(dp[i2-1][j2]>dp[i2][j2-1]){tC.unshift({ch:target[i2-1],t:'m'});i2--;}else{sC.unshift({ch:spokenClean[j2-1],t:'w'});j2--;}}
  while(i2>0){tC.unshift({ch:target[i2-1],t:'m'});i2--;}
  while(j2>0){sC.unshift({ch:spokenClean[j2-1],t:'w'});j2--;}
  function fmt(arr){var h='';arr.forEach(function(c,ci){var cls=c.t==='c'?'correct-char':c.t==='m'?'miss-char':'wrong-char';h+='<span class="'+cls+'">'+c.ch+'</span>';if((ci+1)%15===0)h+='<br>';});return h;}
  var sc=acc>=90?'perfect':acc>=60?'good':'bad';
  var html='<div class="recite-result">';
  html+='<div class="recite-score '+sc+'">'+acc+'%</div>';
  html+='<div style="color:#666">'+match+'/'+m+' 个字匹配</div>';
  html+='<div style="margin-top:12px;text-align:left">';
  html+='<div style="font-size:0.85em;color:var(--gray);margin-bottom:4px">你背的：</div>';
  html+='<div class="recite-transcript">'+fmt(sC)+'</div>';
  html+='<div style="font-size:0.85em;color:var(--gray);margin:8px 0 4px">原文：</div>';
  html+='<div class="recite-transcript">'+fmt(tC)+'</div>';
  html+='</div>';
  html+='<div class="btn-group" style="justify-content:center;margin-top:12px">';
  html+='<button class="btn btn-primary btn-sm" onclick="startReciteListen(\''+poemTitle+'\')">再背一次</button>';
  html+='</div></div>';
  if (resultDiv) resultDiv.innerHTML = html;
  if (acc>=90) addPoints(30); else if (acc>=60) addPoints(15);
  updateGameStats();
}

var vocabGameState = {lessonIdx:0, wordIdx:0, hearts:3, correct:0, wrong:0, score:0, combo:0, maxCombo:0, answered:{}, wrongWords:[], mode:'all', reviewItems:[]};

function getVocabProgress() { return JSON.parse(localStorage.getItem('vocab_progress') || '{}'); }
function isVocabMastered(li, wi) { return !!getVocabProgress()[li+'-'+wi]; }
function markVocabMastered(li, wi) { var d = getVocabProgress(); d[li+'-'+wi]=true; localStorage.setItem('vocab_progress',JSON.stringify(d)); }
function getVocabWrong() { return JSON.parse(localStorage.getItem('vocab_wrong') || '[]'); }
function addVocabWrong(w) { var a=getVocabWrong(); if(a.indexOf(w)<0){a.push(w);localStorage.setItem('vocab_wrong',JSON.stringify(a));} }
function removeVocabWrong(w) { var a=getVocabWrong(); var i=a.indexOf(w); if(i>=0){a.splice(i,1);localStorage.setItem('vocab_wrong',JSON.stringify(a));} }
function clearVocabWrong() { localStorage.setItem('vocab_wrong','[]'); }

function renderVocabDictation() {

    html += '</div>';
    html += '<button class="btn btn-sm" style="background:#ffc107;color:#333;margin-top:8px" onclick="startVocabReview()">\u4e13\u7ec3\u9519\u8bcd</button>';
    html += '</div>';
  }
  html += '<div class="btn-group" style="justify-content:center"><button class="btn btn-primary" onclick="startVocabGame()">\u5f00\u59cb\u9ed8\u5199</button></div>';
  html += '</div>';
  document.getElementById('app').innerHTML = html;
}

function startVocabGame() {
  vocabGameState = {lessonIdx:0,wordIdx:0,hearts:3,correct:0,wrong:0,score:0,combo:0,maxCombo:0,answered:{},wrongWords:[],mode:'all',reviewItems:[]};
  renderVocabQ();
}
function startVocabReview() {
  var wrong = getVocabWrong();
  var items = [];
  TEXTBOOK_VOCAB.forEach(function(sec,si){ sec.words.forEach(function(w,wi){ if(wrong.indexOf(w)>=0) items.push({word:w,li:si,wi:wi}); }); });
  vocabGameState = {lessonIdx:0,wordIdx:0,hearts:3,correct:0,wrong:0,score:0,combo:0,maxCombo:0,answered:{},wrongWords:[],mode:'review',reviewItems:items};
  renderVocabReviewQ();
}

function renderVocabReviewQ() {
  var vg = vocabGameState;
  if (vg.wordIdx >= vg.reviewItems.length) { finishVocabGame(); return; }
  var item = vg.reviewItems[vg.wordIdx];
  showVocabCard(item.word, vg.wordIdx+1, vg.reviewItems.length, '\u9519\u8bcd\u590d\u4e60', item.li, item.wi);
}

function renderVocabQ() {
  var vg = vocabGameState;
  if (vg.lessonIdx >= TEXTBOOK_VOCAB.length) { finishVocabGame(); return; }
  var sec = TEXTBOOK_VOCAB[vg.lessonIdx];
  if (vg.wordIdx >= sec.words.length) { vg.lessonIdx++; vg.wordIdx=0; renderVocabQ(); return; }
  var total = 0; TEXTBOOK_VOCAB.forEach(function(s){total+=s.words.length;});
  var done = 0; for(var i=0;i<vg.lessonIdx;i++) done+=TEXTBOOK_VOCAB[i].words.length; done+=vg.wordIdx;
  showVocabCard(sec.words[vg.wordIdx], done+1, total, sec.lesson, vg.lessonIdx, vg.wordIdx);
}

function showVocabCard(word, num, total, label, li, wi) {
  var vg = vocabGameState;
  var html = '<div class="unit active">';
  html += '<div class="hearts">';
  for(var i=0;i<3;i++) html+='<span class="heart '+(i<vg.hearts?'':'lost')+'">'+(i<vg.hearts?'\u2764\ufe0f':'\u2764')+'</span>';

  html += '<div style="text-align:center;margin:6px 0">';

  html += '</div>';
  html += '<input class="game-input" id="vocabInput" placeholder="请输入" autocomplete="off" autocapitalize="off">';
  html += '<div class="game-answer" id="vocabAnswer" style="display:none"></div>';

function showVocabHint(word, label, num, total, li, wi) {
  var vg = vocabGameState;
  var html = '<div class="unit active">';
  html += '<div class="hearts">';
  for(var i=0;i<3;i++) html+='<span class="heart '+(i<vg.hearts?'':'lost')+'">'+(i<vg.hearts?'\u2764\ufe0f':'\u2764')+'</span>';
  html += '</div>';
  html += '<div style="text-align:center;color:var(--gray);font-size:0.85em;margin:6px 0">'+label+' | '+num+'/'+total+'</div>';

  html += '<div style="margin-top:16px"><button class="btn btn-primary" onclick="renderVocabQ()">记住了，继续</button></div>';
  html += '</div></div>';
  document.getElementById('app').innerHTML = html;
}

function checkVocabAnswer() {
  var vg = vocabGameState;
  var word, li, wi;
  if (vg.mode === 'review') { var it=vg.reviewItems[vg.wordIdx]; word=it.word; li=it.li; wi=it.wi; }
  else { word=TEXTBOOK_VOCAB[vg.lessonIdx].words[vg.wordIdx]; li=vg.lessonIdx; wi=vg.wordIdx; }
  var inp = document.getElementById('vocabInput');
  var ans = document.getElementById('vocabAnswer');
  var val = inp.value.trim();
  if (!val) return;
  var key = li+'-'+wi;
  if (vg.answered[key] !== undefined) return;
  vg.answered[key] = true;
  if (val === word) {
    vg.correct++; vg.combo++;
    if(vg.combo>vg.maxCombo) vg.maxCombo=vg.combo;
    var bonus = vg.combo>=5?15:vg.combo>=3?10:0;
    vg.score += 10+bonus;
    inp.classList.add('correct');
    ans.innerHTML = '<span class="correct-text">\u2705 答对了！</span>' + (bonus>0?' <span style="color:var(--primary);font-weight:600">+连击'+bonus+'</span>':'');
    addPoints(10+bonus);
    markVocabMastered(li,wi);
    removeVocabWrong(word);
  } else {
    vg.wrong++; vg.hearts--; vg.combo=0; vg.score=Math.max(0,vg.score-5);
    inp.classList.add('wrong');
    ans.innerHTML = '\u274c 正确答案：<span class="correct-text" style="font-size:1.3em">'+word+'</span>';
    addVocabWrong(word);
    vg.wrongWords.push(word);
  }
  ans.style.display='block'; inp.disabled=true;
  updateGameStats();
  setTimeout(function(){
    if(vg.hearts<=0){finishVocabGame();return;}
    if(vg.mode==='review'){vg.wordIdx++;renderVocabReviewQ();}
    else{vg.wordIdx++;renderVocabQ();}
  },1200);
}

function finishVocabGame() {
  var vg=vocabGameState;
  var total=vg.correct+vg.wrong;
  var acc=total>0?Math.round(vg.correct/total*100):0;
  var stars=acc>=90?'\u2b50\u2b50\u2b50':acc>=70?'\u2b50\u2b50':acc>=50?'\u2b50':'';
  var html='<div class="unit active"><div class="result-card">';
  html+='<div style="font-size:3em">'+(vg.hearts>0?'\ud83c\udf89':'\ud83d\ude22')+'</div>';
  html+='<div class="result-stars">'+stars+'</div>';
  html+='<div class="result-text">'+(vg.hearts>0?'默写完成！':'生命用完了！')+'</div>';
  html+='<div style="color:var(--gray);line-height:1.8">';
  html+='答对 <b style="color:var(--green)">'+vg.correct+'</b> 个，错误 <b style="color:var(--red)">'+vg.wrong+'</b> 个<br>';
  html+='得分 <b style="color:var(--primary)">'+vg.score+'</b> 分';
  if(vg.maxCombo>=3) html+=' | 最高连击 <b style="color:var(--primary)">'+vg.maxCombo+'</b>';
  html+='</div>';
  html+='<div class="btn-group" style="justify-content:center;margin-top:16px">';
  html+='<button class="btn btn-primary" onclick="startVocabGame()">再来一次</button>';
  if(getVocabWrong().length>0) html+='<button class="btn btn-green" onclick="startVocabReview()">专练错词</button>';
  html+='<button class="btn btn-blue" onclick="renderVocabDictation()">返回</button>';
  html+='</div></div></div>';
  document.getElementById('app').innerHTML = html;
}

var gameState = { level: 0, hearts: 3, correct: 0, wrong: 0, currentIdx: 0, items: [], levelStars: {} };

function getUnitLevels(unitNum) {
  var key = 'dict_levels_u' + unitNum;
  return JSON.parse(localStorage.getItem(key) || '{"0":0,"1":0,"2":0}');
}

function saveUnitLevels(unitNum, levels) {
  localStorage.setItem('dict_levels_u' + unitNum, JSON.stringify(levels));
}

function renderDictation() {
  var u = UNITS.find(function(x) { return x.num === currentUnit; });
  var words = u.review.words;
  var levels = getUnitLevels(currentUnit);
  var wordsPerLevel = 8;
  var totalLevels = Math.ceil(words.length / wordsPerLevel);
  
  var html = '<div class="unit active">';
  html += '<div class="unit-title">' + u.title + ' \xb7 \u95ef\u5173\u9ed8\u5199</div>';
  html += '<div class="unit-subtitle">\u9009\u62e9\u5173\u5361\u5f00\u59cb\u9ed8\u5199\uff0c\u6bcf\u51738\u4e2a\u5b57</div>';
  html += '<div class="level-grid">';
  for (var i = 0; i < totalLevels; i++) {
    var unlocked = i === 0 || levels[i-1] > 0;
    var completed = levels[i] > 0;
    var stars = levels[i] || 0;
    var starStr = '';
    for (var s = 0; s < 3; s++) starStr += s < stars ? '\u2b50' : '\u2606';
    html += '<div class="level-btn ' + (completed ? 'completed' : '') + (unlocked ? '' : 'locked') + '" ' + (unlocked ? 'onclick="startLevel(' + i + ')"' : '') + '>';
    html += '<div class="level-num">' + (i+1) + '</div>';
    html += '<div class="level-stars">' + starStr + '</div>';
    html += '</div>';
  }
  html += '</div></div>';
  document.getElementById('app').innerHTML = html;
}

function startLevel(level) {
  var u = UNITS.find(function(x) { return x.num === currentUnit; });
  var words = u.review.words;
  var start = level * 8;
  var end = Math.min(start + 8, words.length);
  gameState = { level: level, hearts: 3, correct: 0, wrong: 0, currentIdx: 0, items: [], levelStars: getUnitLevels(currentUnit) };
  gameState.items = [];
  for (var i = start; i < end; i++) {
    gameState.items.push({ id: 'g' + currentUnit + '-' + i, pinyin: words[i].pinyin, answer: words[i].char });
  }
  renderGameQuestion();
}

function renderGameQuestion() {
  var g = gameState;
  if (g.currentIdx >= g.items.length) { finishLevel(); return; }
  var item = g.items[g.currentIdx];
  var html = '<div class="unit active">';
  // Hearts
  html += '<div class="hearts">';
  for (var i = 0; i < 3; i++) html += '<span class="heart ' + (i < g.hearts ? '' : 'lost') + '">' + (i < g.hearts ? '\u2764\ufe0f' : '\u2764') + '</span>';
  html += '</div>';
  // Progress
  html += '<div style="text-align:center;color:var(--gray);font-size:0.9em;margin:8px 0">第 ' + (g.currentIdx+1) + ' / ' + g.items.length + ' \u9898</div>';
  // Question
  html += '<div class="game-question">';
  html += '<div class="game-pinyin">' + item.pinyin + '</div>';
  html += '<input class="game-input" id="gameInput" placeholder="\u8bf7\u8f93\u5165" autocomplete="off" autocapitalize="off">';
  html += '<div class="game-answer" id="gameAnswer" style="display:none"></div>';
  html += '</div>';
  html += '<div style="text-align:center;margin-top:16px"><button class="btn btn-primary" onclick="checkGameAnswer()">\u786e\u8ba4</button></div>';
  html += '</div>';
  document.getElementById('app').innerHTML = html;
  var inp = document.getElementById('gameInput');
  inp.focus();
  inp.addEventListener('keydown', function(e) { if (e.key === 'Enter') checkGameAnswer(); });
}

function checkGameAnswer() {
  var g = gameState;
  if (g.currentIdx >= g.items.length) return;
  var item = g.items[g.currentIdx];
  var inp = document.getElementById('gameInput');
  var ans = document.getElementById('gameAnswer');
  var val = inp.value.trim();
  if (!val) return;
  
  if (val === item.answer) {
    g.correct++;
    inp.classList.add('correct');
    ans.innerHTML = '<span class="correct-text">\u2705 \u7b54\u5bf9\u4e86\uff01</span>';
    addPoints(10);
    recordAnswer(item.id, true);
  } else {
    g.wrong++;
    g.hearts--;
    inp.classList.add('wrong');
    ans.innerHTML = '\u274c \u6b63\u786e\u7b54\u6848\uff1a<span class="correct-text">' + item.answer + '</span>';
    recordAnswer(item.id, false);
  }
  ans.style.display = 'block';
  inp.disabled = true;
  updateGameStats();
  
  setTimeout(function() {
    if (g.hearts <= 0) { gameOver(); return; }
    g.currentIdx++;
    renderGameQuestion();
  }, 1200);
}

function gameOver() {
  var html = '<div class="unit active">';
  html += '<div class="result-card">';
  html += '<div style="font-size:3em">\ud83d\ude22</div>';
  html += '<div class="result-text">\u751f\u547d\u7528\u5b8c\u4e86\uff01\u518d\u6765\u4e00\u6b21\u5427\uff01</div>';
  html += '<div class="btn-group" style="justify-content:center">';
  html += '<button class="btn btn-primary" onclick="startLevel(' + gameState.level + ')">\ud83d\udd04 \u91cd\u65b0\u5f00\u59cb</button>';
  html += '<button class="btn btn-blue" onclick="renderDictation()">\u2b05 \u8fd4\u56de</button>';
  html += '</div></div></div>';
  document.getElementById('app').innerHTML = html;
}

function finishLevel() {
  var g = gameState;
  var stars = g.wrong === 0 ? 3 : g.wrong <= 2 ? 2 : 1;
  var oldStars = g.levelStars[g.level] || 0;
  if (stars > oldStars) g.levelStars[g.level] = stars;
  saveUnitLevels(currentUnit, g.levelStars);
  addPoints(stars * 20);
  updateGameStats();
  
  var starStr = '';
  for (var i = 0; i < 3; i++) starStr += i < stars ? '\u2b50' : '\u2606';
  var html = '<div class="unit active">';
  html += '<div class="result-card">';
  html += '<div style="font-size:3em">\ud83c\udf89</div>';
  html += '<div class="result-stars">' + starStr + '</div>';
  html += '<div class="result-text">\u606d\u559c\u901a\u5173\uff01\u8d5f\u5f97 ' + (stars*20) + ' \u5206</div>';
  html += '<div style="color:var(--gray);font-size:0.9em">\u7b54\u5bf9 ' + g.correct + ' / ' + g.items.length + ' \u4e2a\uff0c\u9519\u8bef ' + g.wrong + ' \u4e2a</div>';
  html += '<div class="btn-group" style="justify-content:center;margin-top:16px">';
  var u = UNITS.find(function(x) { return x.num === currentUnit; });
  var totalLevels = Math.ceil(u.review.words.length / 8);
  if (g.level + 1 < totalLevels) {
    html += '<button class="btn btn-green" onclick="startLevel(' + (g.level+1) + ')">\u27a1 \u4e0b\u4e00\u5173</button>';
  }
  html += '<button class="btn btn-primary" onclick="renderDictation()">\ud83c\udfaf \u9009\u62e9\u5173\u5361</button>';
  html += '</div></div></div>';
  document.getElementById('app').innerHTML = html;
}
</script>
</body>
</html>
