<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>三年级下册语文复习</title>
<style>
:root{--primary:#e67e22;--green:#27ae60;--red:#e74c3c;--blue:#3498db;--bg:#fdf6ec;--card:#fff;--text:#333;--gray:#999;--shadow:0 2px 12px rgba(0,0,0,0.08)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"PingFang SC","Microsoft YaHei","Hiragino Sans GB",sans-serif;background:var(--bg);color:var(--text);line-height:1.7}
.header{background:linear-gradient(135deg,#e67e22,#f39c12);color:#fff;padding:20px;text-align:center;position:sticky;top:0;z-index:100;box-shadow:var(--shadow)}
.header h1{font-size:1.4em;margin-bottom:4px}
.header p{font-size:0.85em;opacity:0.9}
.tabs{display:flex;overflow-x:auto;background:#fff;border-bottom:2px solid #eee;position:sticky;top:68px;z-index:99;-webkit-overflow-scrolling:touch}
.tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;padding:12px 18px;cursor:pointer;font-size:0.9em;border-bottom:3px solid transparent;transition:all .2s;white-space:nowrap}
.tab:hover{background:#fff5e6}
.tab.active{color:var(--primary);border-bottom-color:var(--primary);font-weight:600}
.container{max-width:800px;margin:0 auto;padding:16px}
.unit{display:none}
.unit.active{display:block}
.section{background:var(--card);border-radius:12px;padding:20px;margin-bottom:16px;box-shadow:var(--shadow)}
.section h2{color:var(--primary);font-size:1.15em;margin-bottom:12px;padding-bottom:8px;border-bottom:2px dashed #f0e0c0}
.section h3{color:var(--green);font-size:1em;margin:12px 0 8px}
.section h4{color:#555;font-size:0.95em;margin:8px 0 4px}
.poem{background:#fffbf0;border-left:4px solid var(--primary);padding:12px 16px;margin:8px 0;border-radius:0 8px 8px 0;font-size:0.95em}
.poem .title{font-weight:700;color:var(--primary)}
.poem .author{text-align:right;color:var(--gray);font-size:0.85em}
.word-list{display:flex;flex-wrap:wrap;gap:8px;margin:8px 0}
.word-tag{background:#f0f9ff;border:1px solid #d0e8ff;border-radius:6px;padding:4px 10px;font-size:0.9em}
.word-tag .pinyin{color:var(--blue);font-size:0.8em}
.key-sentence{background:#f8f8f8;padding:10px 14px;border-radius:8px;margin:6px 0;font-size:0.9em;line-height:1.8}
.key-sentence em{color:var(--red);font-style:normal;font-weight:600}
.tip{background:#fff3cd;border-radius:8px;padding:10px 14px;margin:8px 0;font-size:0.88em;color:#856404}
.tip::before{content:"💡 ";font-size:1.1em}
/* Quiz */
.quiz-section{background:#f0f7ff;border-radius:12px;padding:20px;margin:16px 0}
.quiz-section h2{color:var(--blue)}
.quiz-q{margin:14px 0;padding:12px;background:#fff;border-radius:8px;border:1px solid #e0e0e0}
.quiz-q .q-title{font-weight:600;margin-bottom:8px}
.quiz-q .q-title .q-num{color:var(--blue);margin-right:6px}
.quiz-options{display:flex;flex-direction:column;gap:6px}
.quiz-opt{padding:8px 12px;border:1px solid #ddd;border-radius:6px;cursor:pointer;transition:all .2s;font-size:0.9em}
.quiz-opt:hover{background:#e8f4fd;border-color:var(--blue)}
.quiz-opt.selected{background:#d4edff;border-color:var(--blue)}
.quiz-opt.correct{background:#d4edda;border-color:var(--green);color:#155724}
.quiz-opt.wrong{background:#f8d7da;border-color:var(--red);color:#721c24}
.fill-blank{display:inline-block;border-bottom:2px solid var(--primary);min-width:80px;padding:2px 4px;margin:2px 4px}
.fill-input{border:none;border-bottom:2px solid var(--blue);outline:none;width:100px;padding:2px 4px;font-size:0.95em;text-align:center;font-family:inherit}
.btn{display:inline-block;padding:10px 24px;border:none;border-radius:8px;font-size:0.95em;cursor:pointer;transition:all .2s;font-family:inherit}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{background:#d35400}
.btn-green{background:var(--green);color:#fff}
.btn-green:hover{background:#219a52}
.btn-blue{background:var(--blue);color:#fff}
.btn-blue:hover{background:#2980b9}
.btn-group{display:flex;gap:10px;margin:16px 0;flex-wrap:wrap}
.score-box{background:linear-gradient(135deg,var(--green),#2ecc71);color:#fff;border-radius:12px;padding:20px;text-align:center;margin:16px 0;display:none}
.score-box .score-num{font-size:2.5em;font-weight:700}
.score-box .score-text{font-size:0.9em;opacity:0.9;margin-top:4px}
.unit-title{font-size:1.3em;color:var(--primary);font-weight:700;margin-bottom:16px;text-align:center}
.unit-subtitle{font-size:0.9em;color:var(--gray);text-align:center;margin-top:-12px;margin-bottom:16px}
/* Print */
@media print{.header,.tabs,.btn-group,.score-box{display:none!important}.unit{display:block!important}.section{break-inside:avoid;box-shadow:none;border:1px solid #ddd}}
/* Mobile */
@media(max-width:600px){.container{padding:10px}.section{padding:14px}.tab{padding:10px 12px;font-size:0.82em}.header h1{font-size:1.2em}}
.list-num{display:inline-block;width:22px;height:22px;background:var(--primary);color:#fff;border-radius:50%;text-align:center;line-height:22px;font-size:0.8em;margin-right:6px;flex-shrink:0}
.check-item{display:flex;align-items:flex-start;margin:6px 0;padding:6px 0;border-bottom:1px dashed #eee;font-size:0.92em}
.check-item:last-child{border-bottom:none}
.check-box{width:18px;height:18px;border:2px solid #ccc;border-radius:4px;margin-right:8px;margin-top:3px;flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
.check-box.checked{background:var(--green);border-color:var(--green);color:#fff}
.check-box.checked::after{content:"✓";font-size:12px;color:#fff}
.nav-btn{position:fixed;bottom:20px;right:20px;z-index:100;display:flex;gap:8px}
.nav-btn .btn{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.2em;box-shadow:var(--shadow);padding:0}
/* Tab colors */
.tab[data-unit="1"]{border-bottom-color:#e67e22}
.tab[data-unit="2"]{border-bottom-color:#e74c3c}
.tab[data-unit="3"]{border-bottom-color:#3498db}
.tab[data-unit="4"]{border-bottom-color:#9b59b6}
.tab[data-unit="5"]{border-bottom-color:#1abc9c}
.tab[data-unit="6"]{border-bottom-color:#e91e63}
.tab[data-unit="7"]{border-bottom-color:#ff9800}
.tab[data-unit="8"]{border-bottom-color:#607d8b}
</style>
</head>

// ============ APP LOGIC ============
let currentUnit = 1;
let quizState = {};

function renderTabs() {
  const tabsEl = document.getElementById('tabs');
  tabsEl.innerHTML = UNITS.map(u =>
    `<div class="tab${u.num===currentUnit?' active':''}" data-unit="${u.num}" onclick="switchUnit(${u.num})">${u.title}</div>`
  ).join('');
}

function switchUnit(n) {
  currentUnit = n;
  renderTabs();
  renderUnit();
  window.scrollTo({top: 0, behavior: 'smooth'});
}

function renderUnit() {
  const u = UNITS.find(x => x.num === currentUnit);
  const app = document.getElementById('app');
  quizState = {};

  let html = `<div class="unit active">`;
  html += `<div class="unit-title">${u.title} · ${u.theme}</div>`;
  html += `<div class="unit-subtitle">${u.subtitle}</div>`;

  // Review section
  html += `<div class="section"><h2>📋 复习清单</h2>`;

  // Poems
  if (u.review.poems.length > 0) {
    html += `<h3>🖊️ 必背古诗</h3>`;
    u.review.poems.forEach(p => {
      html += `<div class="poem">
        <div class="title">《${p.title}》</div>
        <div class="author">${p.author}</div>
        <div style="margin-top:8px;white-space:pre-line">${p.content}</div>
        <div style="margin-top:8px;color:#666;font-size:0.85em">📝 ${p.notes}</div>
      </div>`;
    });
  }

  // Words
  html += `<h3>✍️ 必会字词</h3><div class="word-list">`;
  u.review.words.forEach(w => {
    html += `<div class="word-tag"><span style="font-size:1.1em;font-weight:600">${w.char}</span> <span class="pinyin">${w.pinyin}</span><br><span style="font-size:0.82em;color:#666">${w.words}</span></div>`;
  });
  html += `</div>`;

  // Key sentences
  html += `<h3>⭐ 重点句子</h3>`;
  u.review.keySentences.forEach(s => {
    html += `<div class="key-sentence">${s}</div>`;
  });

  // Tips
  html += `<h3>📌 复习要点</h3>`;
  u.review.tips.forEach(t => {
    html += `<div class="tip">${t}</div>`;
  });

  html += `</div>`; // end review section

  // Quiz section
  html += `<div class="quiz-section"><h2>📝 单元测试</h2>`;

  // Choose questions
  html += `<h3>一、选择题（每题3分，共${u.quiz.choose.length*3}分）</h3>`;
  u.quiz.choose.forEach((q, i) => {
    html += `<div class="quiz-q" data-qi="${i}" data-type="choose">
      <div class="q-title"><span class="q-num">${i+1}.</span>${q.q}</div>
      <div class="quiz-options">`;
    q.opts.forEach((opt, j) => {
      html += `<div class="quiz-opt" data-qi="${i}" data-oi="${j}" onclick="selectOpt(this,'choose',${i},${j})">${String.fromCharCode(65+j)}. ${opt}</div>`;
    });
    html += `</div></div>`;
  });

  // Fill questions
  html += `<h3>二、填空题（每空2分，共${u.quiz.fill.reduce((a,f)=>a+f.a.split(',').length,0)*2}分）</h3>`;
  u.quiz.fill.forEach((q, i) => {
    const parts = q.q.split('____');
    let fillHtml = `<div class="quiz-q" data-fi="${i}" data-type="fill"><div class="q-title"><span class="q-num">${i+1}.</span>`;
    parts.forEach((part, pi) => {
      fillHtml += part;
      if (pi < parts.length - 1) {
        fillHtml += `<input class="fill-input" data-fi="${i}" data-fpi="${pi}" placeholder="____" style="width:${Math.max(60, (q.a.split(',')[pi]||'').length*20)}px">`;
      }
    });
    fillHtml += `</div></div>`;
    html += fillHtml;
  });

  // Reading
  if (u.quiz.read) {
    html += `<h3>三、阅读理解</h3>`;
    html += `<div class="quiz-q" style="background:#fffbf0"><div style="white-space:pre-line;font-size:0.92em;line-height:1.8">${u.quiz.read.passage}</div></div>`;
    u.quiz.read.questions.forEach((q, i) => {
      html += `<div class="quiz-q" data-ri="${i}" data-type="read">
        <div class="q-title"><span class="q-num">阅读${i+1}.</span>${q.q}</div>
        <div class="quiz-options">`;
      q.opts.forEach((opt, j) => {
        html += `<div class="quiz-opt" data-ri="${i}" data-oi="${j}" onclick="selectOpt(this,'read',${i},${j})">${String.fromCharCode(65+j)}. ${opt}</div>`;
      });
      html += `</div></div>`;
    });
  }

  html += `</div>`; // end quiz section

  // Score box
  html += `<div class="score-box" id="scoreBox"><div class="score-num" id="scoreNum"></div><div class="score-text" id="scoreText"></div></div>`;

  // Buttons
  html += `<div class="btn-group">
    <button class="btn btn-primary" onclick="checkScore()">📊 提交评分</button>
    <button class="btn btn-green" onclick="resetQuiz()">🔄 重新作答</button>
    <button class="btn btn-blue" onclick="window.print()">🖨️ 打印本页</button>
  </div>`;

  html += `</div>`; // end unit
  app.innerHTML = html;
}

function selectOpt(el, type, qi, oi) {
  const prefix = type === 'choose' ? 'choose' : 'read';
  const attr = type === 'choose' ? 'qi' : 'ri';
  document.querySelectorAll(`.quiz-q[data-type="${type}"] .quiz-opt`).forEach(o => {
    if (o.dataset[attr] == qi) o.classList.remove('selected');
  });
  el.classList.add('selected');
}

function checkScore() {
  const u = UNITS.find(x => x.num === currentUnit);
  let total = 0, correct = 0;

  // Check choose
  u.quiz.choose.forEach((q, i) => {
    total += 3;
    const sel = document.querySelector(`.quiz-q[data-qi="${i}"][data-type="choose"] .quiz-opt.selected`);
    const opts = document.querySelectorAll(`.quiz-q[data-qi="${i}"][data-type="choose"] .quiz-opt`);
    opts.forEach(o => {
      const oi = parseInt(o.dataset.oi);
      if (oi === q.ans) o.classList.add('correct');
      if (sel && parseInt(sel.dataset.oi) === oi && oi !== q.ans) o.classList.add('wrong');
    });
    if (sel && parseInt(sel.dataset.oi) === q.ans) correct += 3;
  });

  // Check fill
  u.quiz.fill.forEach((q, i) => {
    const answers = q.a.split(',');
    answers.forEach((ans, pi) => {
      total += 2;
      const input = document.querySelector(`.fill-input[data-fi="${i}"][data-fpi="${pi}"]`);
      if (input) {
        const val = input.value.trim();
        if (val === ans) {
          correct += 2;
          input.style.borderColor = '#27ae60';
          input.style.background = '#d4edda';
        } else {
          input.style.borderColor = '#e74c3c';
          input.style.background = '#f8d7da';
          input.placeholder = ans;
        }
      }
    });
  });

  // Check read
  if (u.quiz.read) {
    u.quiz.read.questions.forEach((q, i) => {
      total += 3;
      const sel = document.querySelector(`.quiz-q[data-ri="${i}"][data-type="read"] .quiz-opt.selected`);
      const opts = document.querySelectorAll(`.quiz-q[data-ri="${i}"][data-type="read"] .quiz-opt`);
      opts.forEach(o => {
        const oi = parseInt(o.dataset.oi);
        if (oi === q.ans) o.classList.add('correct');
        if (sel && parseInt(sel.dataset.oi) === oi && oi !== q.ans) o.classList.add('wrong');
      });
      if (sel && parseInt(sel.dataset.oi) === q.ans) correct += 3;
    });
  }

  const pct = Math.round(correct / total * 100);
  const box = document.getElementById('scoreBox');
  const num = document.getElementById('scoreNum');
  const text = document.getElementById('scoreText');
  box.style.display = 'block';
  num.textContent = `${correct}/${total}分`;
  text.textContent = pct >= 90 ? '🌟 优秀！继续保持！' :
                     pct >= 70 ? '👍 良好！再加把劲！' :
                     pct >= 60 ? '💪 及格了，还需努力！' :
                     '📚 加油！再复习一遍吧！';
  box.scrollIntoView({behavior: 'smooth'});
}

function resetQuiz() {
  renderUnit();
  window.scrollTo({top: 0, behavior: 'smooth'});
}

function scrollToTop() {
  window.scrollTo({top: 0, behavior: 'smooth'});
}

// Init
renderTabs();
renderUnit();
</script>
</body>
</html>
